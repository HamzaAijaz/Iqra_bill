<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1f3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="IqraBill">
<title>اقراء یونیفارم سینٹر</title>
<style>
:root {
  --navy: #0b1f3a;
  --gold: #c9973a;
  --gold-light: #e8b95a;
  --cream: #faf8f4;
  --white: #ffffff;
  --surface: #f4f6fb;
  --border: #dde3ef;
  --text: #1a2636;
  --muted: #6b7a93;
  --boys: #1f4fb3;
  --boys-soft: #eef3ff;
  --girls: #b3195c;
  --girls-soft: #fff0f6;
  --shadow-md: 0 4px 16px rgba(11,31,58,0.10);
  --shadow-lg: 0 12px 40px rgba(11,31,58,0.14);
  --radius: 12px;
  --radius-sm: 8px;
  --urdu: 'Jameel Noori Nastaleeq','Noto Nastaliq Urdu','Nafees Web Naskh',serif;
  --nums: Arial, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--urdu);direction:rtl;background:var(--cream);min-height:100vh;color:var(--text);}

/* HEADER */
.header{background:linear-gradient(135deg,#0b1f3a 0%,#1a3a6a 60%,#0f2a4d 100%);padding:22px 32px;display:flex;align-items:center;justify-content:space-between;}
.header-brand h1{font-family:var(--urdu);font-size:28px;color:#fff;line-height:1.4;}
.header-brand p{font-family:var(--urdu);font-size:13px;color:var(--gold-light);margin-top:2px;}
.header-badge{background:rgba(201,151,58,0.2);border:1px solid rgba(201,151,58,0.4);color:var(--gold-light);font-family:var(--urdu);font-size:13px;padding:6px 16px;border-radius:20px;white-space:nowrap;}

/* MAIN */
.main{max-width:1180px;margin:0 auto;padding:24px 16px 60px;}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-md);border:1px solid var(--border);padding:20px 20px;margin-bottom:18px;overflow:hidden;}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-direction:row-reverse;justify-content:flex-end;}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--navy);color:var(--gold-light);}
.card-title{font-family:var(--urdu);font-size:16px;font-weight:600;color:var(--muted);}
.field-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;overflow:hidden;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:var(--urdu);font-size:13px;font-weight:600;color:var(--muted);text-align:right;}
.field input,.field select{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--urdu);color:var(--text);background:var(--surface);outline:none;width:100%;min-width:0;max-width:100%;text-align:right;}
.field input:focus,.field select:focus{border-color:var(--boys);background:var(--white);}
.balance-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}

/* SECTION */
.section-header{display:flex;align-items:center;gap:12px;margin:22px 0 10px;flex-direction:row-reverse;}
.section-pill{padding:6px 18px;border-radius:20px;font-family:var(--urdu);font-size:14px;font-weight:700;white-space:nowrap;}
.section-pill.boys{background:var(--boys);color:#fff;}
.section-pill.girls{background:var(--girls);color:#fff;}
.section-line{flex:1;height:1px;background:var(--border);}
.section-count{font-family:var(--nums);font-size:12px;color:var(--muted);white-space:nowrap;direction:ltr;}

/* SIZE GRID */
.size-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:9px;}
.size-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 7px 9px;text-align:center;position:relative;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
.size-card.boys-card.active{border-color:var(--boys);background:var(--boys-soft);}
.size-card.girls-card.active{border-color:var(--girls);background:var(--girls-soft);}
.size-label{font-family:var(--nums);font-size:18px;font-weight:700;color:var(--text);line-height:1;margin-bottom:2px;direction:ltr;}
.size-tag{font-family:var(--urdu);font-size:11px;font-weight:700;margin-bottom:4px;}
.size-tag.boys{color:var(--boys);}
.size-tag.girls{color:var(--girls);}
.size-rate{font-family:var(--nums);font-size:10px;color:var(--muted);margin-bottom:7px;direction:ltr;}
.size-card input{width:100%;text-align:center;padding:7px 4px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--nums);font-size:15px;font-weight:600;color:var(--text);background:var(--surface);outline:none;direction:ltr;}
.size-card.boys-card input:focus{border-color:var(--boys);}
.size-card.girls-card input:focus{border-color:var(--girls);}
.qty-badge{position:absolute;top:5px;left:5px;background:var(--boys);color:#fff;font-family:var(--nums);font-size:9px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.size-card.girls-card .qty-badge{background:var(--girls);}
.size-card.active .qty-badge{opacity:1;}

/* SUMMARY */
.summary-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:18px;}
.summary-inner{display:grid;grid-template-columns:repeat(4,1fr);}
.summary-cell{padding:16px 12px;border-left:1px solid var(--border);text-align:center;}
.summary-cell:last-child{border-left:none;}
.s-label{font-family:var(--urdu);font-size:12px;color:var(--muted);margin-bottom:4px;}
.s-value{font-family:var(--nums);font-size:20px;font-weight:700;color:var(--text);direction:ltr;display:block;}
.total-cell{background:var(--navy);}
.total-cell .s-label{color:rgba(255,255,255,0.6);}
.total-cell .s-value{color:var(--gold-light);font-size:16px;}

/* BALANCE BAR */
.balance-bar{display:grid;grid-template-columns:repeat(3,1fr);margin-top:10px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.bal-cell{padding:14px 10px;text-align:center;}
.bal-cell.prev{background:#fff8ee;}
.bal-cell.recv{background:#edfaf4;}
.bal-cell.remain{background:#0b1f3a;}
.bal-lbl{font-family:var(--urdu);font-size:12px;margin-bottom:3px;}
.bal-cell.prev .bal-lbl{color:#b8852e;}
.bal-cell.recv .bal-lbl{color:#1a7a4c;}
.bal-cell.remain .bal-lbl{color:rgba(255,255,255,0.7);}
.bal-val{font-family:var(--nums);font-size:17px;font-weight:700;direction:ltr;display:block;}
.bal-cell.prev .bal-val{color:#b8852e;}
.bal-cell.recv .bal-val{color:#1a7a4c;}
.bal-cell.remain .bal-val{color:#e8b95a;}

/* BUTTONS */
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
.btn{padding:12px 10px;border:none;border-radius:var(--radius-sm);font-family:var(--urdu);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;}
.btn-primary{background:linear-gradient(135deg,#1f4fb3,#2d6cdf);color:#fff;}
.btn-gold{background:linear-gradient(135deg,#b8852e,#d4a045);color:#fff;}
.btn-ghost{background:var(--surface);color:var(--muted);border:1.5px solid var(--border);}
#hideBtn{display:none;margin-top:8px;width:100%;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:20px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:var(--radius-sm);font-family:var(--urdu);font-size:14px;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:999;border-right:3px solid var(--gold);}
.toast.show{transform:translateY(0);opacity:1;}

/* PDF OVERLAY */
.pdf-overlay{position:fixed;inset:0;background:rgba(11,31,58,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.pdf-overlay.show{display:flex;}
.pdf-spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.2);border-top-color:#e8b95a;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.pdf-overlay p{font-family:var(--urdu);color:#fff;font-size:17px;}

/* INVOICE */
#invoice{display:none;margin-top:20px;}

/* INVOICE STYLES */
.inv-wrap{font-family:var(--urdu);background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);direction:rtl;}
.inv-head{background:linear-gradient(135deg,#0b1f3a,#1a3a6a);padding:22px 28px;display:flex;align-items:center;justify-content:space-between;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-head-left h1{font-family:var(--urdu);font-size:30px;color:#fff;line-height:1.5;}
.inv-head-left p{font-family:var(--nums);font-size:13px;color:#e8b95a;font-weight:bold;text-align:center;margin-top:4px;}
.inv-head-right{text-align:left;}
.inv-head-right .inv-no{font-family:var(--nums);font-size:12px;color:#fff;direction:ltr;}
.inv-head-right .inv-date{font-family:var(--nums);color:#e8b95a;font-size:14px;font-weight:600;margin-top:3px;direction:ltr;}
.inv-meta{display:flex;flex-direction:row-reverse;justify-content:space-between;padding:14px 24px;background:#f8faff;border-bottom:1px solid var(--border);}
.inv-meta-block .lbl{font-family:var(--urdu);font-size:13px;color:var(--muted);}
.inv-meta-block .val{font-family:var(--urdu);font-size:17px;font-weight:600;color:var(--text);margin-top:2px;}
.inv-meta-block .val.num{font-family:var(--nums);direction:ltr;display:inline-block;}
.inv-body{padding:20px 24px;}
.inv-tables{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
.inv-table-wrap.boys{background:#f0f5ff;border:2px solid var(--boys);border-radius:9px;padding:10px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-table-wrap.girls{background:#fff0f6;border:2px solid var(--girls);border-radius:9px;padding:10px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-table-wrap h3{background:#0b1f3a;color:#fff;text-align:center;padding:9px 14px;border-radius:7px;margin-bottom:9px;font-size:16px;font-family:var(--urdu);font-weight:bold;display:block;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
table.inv-table{width:100%;border-collapse:collapse;font-family:var(--nums);font-size:14px;direction:rtl;}
table.inv-table th{padding:9px 8px;font-family:var(--urdu);font-size:13px;color:var(--muted);border-bottom:2px solid var(--border);text-align:center;}
table.inv-table td{padding:8px;text-align:center;border-bottom:1px solid #f0f3f8;font-family:var(--nums);}
table.inv-table tfoot td{border-top:2px solid var(--border);border-bottom:none;font-weight:700;padding-top:9px;}
.inv-totals{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;display:flex;flex-direction:row-reverse;justify-content:space-between;align-items:center;margin-bottom:14px;}
.inv-qty-grid{display:flex;flex-direction:row-reverse;gap:20px;}
.inv-qty-item .lbl{font-family:var(--urdu);font-size:12px;color:var(--muted);}
.inv-qty-item .val{font-family:var(--nums);font-size:18px;font-weight:700;margin-top:2px;direction:ltr;display:block;text-align:center;}
.inv-qty-item.boys .val{color:var(--boys);}
.inv-qty-item.girls .val{color:var(--girls);}
.inv-boxes{display:flex;flex-direction:column;gap:7px;min-width:190px;}
.inv-grand{background:#0b1f3a;border-radius:7px;padding:10px 20px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-grand .lbl{font-family:var(--urdu);font-size:13px;color:#fff;margin-bottom:2px;}
.inv-grand .val{font-family:var(--nums);font-size:22px;color:#e8b95a;direction:ltr;display:block;}
.inv-prev{background:#b8852e;border-radius:7px;padding:9px 20px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-prev .lbl{font-family:var(--urdu);font-size:12px;color:rgba(255,255,255,0.85);margin-bottom:2px;}
.inv-prev .val{font-family:var(--nums);font-size:18px;color:#fff;direction:ltr;display:block;}
.inv-recv{background:#1a7a4c;border-radius:7px;padding:9px 20px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-recv .lbl{font-family:var(--urdu);font-size:12px;color:rgba(255,255,255,0.85);margin-bottom:2px;}
.inv-recv .val{font-family:var(--nums);font-size:18px;color:#fff;direction:ltr;display:block;}
.inv-remain{background:#0b1f3a;border:2px solid #e8b95a;border-radius:7px;padding:10px 20px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-remain .lbl{font-family:var(--urdu);font-size:13px;color:#fff;font-weight:bold;margin-bottom:2px;}
.inv-remain .val{font-family:var(--nums);font-size:24px;color:#e8b95a;direction:ltr;display:block;font-weight:bold;}
.inv-foot{background:#0b1f3a;padding:13px 24px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.inv-foot p{font-family:var(--urdu);font-size:16px;color:#fff;}
.inv-foot span{color:#e8b95a;}

@media print{
  body *{visibility:hidden!important;}
  #invoice,#invoice *{visibility:visible!important;}
  #invoice{display:block!important;position:absolute!important;inset:0!important;margin:0!important;width:100%!important;}
}
@media(max-width:700px){
  .field-row{grid-template-columns:1fr 1fr;}
  .summary-inner{grid-template-columns:1fr 1fr;}
  .actions{grid-template-columns:1fr 1fr;}
  .inv-tables{grid-template-columns:1fr;}
  .size-grid{grid-template-columns:repeat(auto-fill,minmax(76px,1fr));}
  .header{padding:16px 18px;}
  .header-brand h1{font-size:22px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <h1>اقراء یونیفارم سینٹر</h1>
    <p>پوائنٹ آف سیل سسٹم</p>
  </div>
  <div class="header-badge">ورژن ۲.۰</div>
</header>

<main class="main">

  <div class="card">
    <div class="card-header">
      <div class="card-icon">👤</div>
      <span class="card-title">آرڈر کی تفصیل</span>
    </div>
    <div class="field-row">
      <div class="field">
        <label>بنام</label>
        <select id="customer" onchange="onCustomerChange()" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'Jameel Noori Nastaleeq','Noto Nastaliq Urdu',serif;color:var(--text);background:var(--surface);outline:none;width:100%;min-width:0;cursor:pointer;direction:rtl;text-align:right;">
          <option value="Qari Idrees Sahib">قاری ادریس صاحب</option>
          <option value="Qari Sadiq Sahib">قاری صادق صاحب</option>
        </select>
      </div>
      <div class="field">
        <label>تاریخ</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;">
          <select id="dd" style="padding:9px 3px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:Arial,sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;width:100%;min-width:0;direction:ltr;"></select>
          <select id="mm" style="padding:9px 3px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:Arial,sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;width:100%;min-width:0;direction:ltr;"></select>
          <select id="yy" style="padding:9px 3px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:Arial,sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;width:100%;min-width:0;direction:ltr;"></select>
        </div>
      </div>
      <div class="field">
        <label>بل نمبر</label>
        <input type="text" id="invoiceNo" placeholder="خودکار" style="font-family:Arial,sans-serif;direction:ltr;text-align:left;">
      </div>
    </div>
    <div class="balance-row">
      <div class="field">
        <label>پچھلا بقایا (روپے)</label>
        <input type="number" id="prevBalance" value="0" min="0" oninput="updateBalance()" style="font-family:Arial,sans-serif;direction:ltr;text-align:left;">
      </div>
      <div class="field">
        <label>وصول شدہ رقم (روپے)</label>
        <input type="number" id="received" value="0" min="0" oninput="updateBalance()" style="font-family:Arial,sans-serif;direction:ltr;text-align:left;">
      </div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-pill boys">لڑکوں کے سائز</span>
    <div class="section-line"></div>
    <span class="section-count" id="boys-count">0 pcs — Rs. 0</span>
  </div>
  <div id="boys" class="size-grid"></div>

  <div class="section-header">
    <span class="section-pill girls">لڑکیوں کے سائز</span>
    <div class="section-line"></div>
    <span class="section-count" id="girls-count">0 pcs — Rs. 0</span>
  </div>
  <div id="girls" class="size-grid"></div>

  <div class="summary-bar">
    <div class="summary-inner">
      <div class="summary-cell">
        <div class="s-label">لڑکوں کی تعداد</div>
        <div class="s-value" id="tBoys">0</div>
      </div>
      <div class="summary-cell">
        <div class="s-label">لڑکیوں کی تعداد</div>
        <div class="s-value" id="tGirls">0</div>
      </div>
      <div class="summary-cell">
        <div class="s-label">کل تعداد</div>
        <div class="s-value" id="tQty">0</div>
      </div>
      <div class="summary-cell total-cell">
        <div class="s-label">کل رقم</div>
        <div class="s-value" id="total">Rs. 0</div>
      </div>
    </div>
  </div>

  <div class="balance-bar">
    <div class="bal-cell prev">
      <div class="bal-lbl">پچھلا بقایا</div>
      <div class="bal-val" id="dispPrev">0</div>
    </div>
    <div class="bal-cell recv">
      <div class="bal-lbl">وصول شدہ</div>
      <div class="bal-val" id="dispReceived">0</div>
    </div>
    <div class="bal-cell remain">
      <div class="bal-lbl">باقی رقم</div>
      <div class="bal-val" id="dispRemaining">0</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="calculate()">🧮 حساب کریں</button>
    <button class="btn btn-gold" onclick="generateInvoice()">🖨️ بل پرنٹ</button>
    <button class="btn btn-ghost" onclick="resetAll()">🔄 دوبارہ شروع</button>
  </div>
  <button class="btn btn-ghost" id="hideBtn" onclick="hideInvoice()">✕ بل بند کریں</button>

</main>

<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner"></div>
  <p>بل تیار ہو رہا ہے...</p>
</div>

<div id="invoice"></div>
<div class="toast" id="toast"></div>

<script>
var sizes = [20,22,24,26,28,30,32,34,36,38,40];

var rates = {
  'Qari Idrees Sahib': {
    boys:  {20:775,22:800,24:825,26:850,28:875,30:900,32:925,34:975,36:1025,38:1125,40:1225},
    girls: {20:925,22:950,24:975,26:1000,28:1025,30:1050,32:1075,34:1125,36:1175,38:1275,40:1375}
  },
  'Qari Sadiq Sahib': {
    boys:  {20:800,22:850,24:900,26:950,28:1000,30:1050,32:1100,34:1150,36:1250,38:1450,40:1750},
    girls: {20:1000,22:1050,24:1100,26:1150,28:1200,30:1250,32:1300,34:1350,36:1450,38:1650,40:1950}
  }
};

var boysRate = {};
var girlsRate = {};
for(var k in rates['Qari Idrees Sahib'].boys) boysRate[k] = rates['Qari Idrees Sahib'].boys[k];
for(var k in rates['Qari Idrees Sahib'].girls) girlsRate[k] = rates['Qari Idrees Sahib'].girls[k];

// Date dropdowns
(function(){
  var now = new Date();
  var ddEl = document.getElementById('dd');
  var mmEl = document.getElementById('mm');
  var yyEl = document.getElementById('yy');
  for(var d=1;d<=31;d++){
    var o=document.createElement('option');
    o.value=String(d).padStart(2,'0');
    o.textContent=String(d).padStart(2,'0');
    if(d===now.getDate()) o.selected=true;
    ddEl.appendChild(o);
  }
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(var i=0;i<months.length;i++){
    var o=document.createElement('option');
    o.value=String(i+1).padStart(2,'0');
    o.textContent=months[i];
    if(i===now.getMonth()) o.selected=true;
    mmEl.appendChild(o);
  }
  for(var y=now.getFullYear();y>=2020;y--){
    var o=document.createElement('option');
    o.value=y; o.textContent=y;
    if(y===now.getFullYear()) o.selected=true;
    yyEl.appendChild(o);
  }
})();

// Auto invoice number
var invNum = 'IUC-' + (Math.floor(Math.random()*9000)+1000);
document.getElementById('invoiceNo').value = invNum;

function buildGrid(){
  var b = document.getElementById('boys');
  var g = document.getElementById('girls');
  for(var i=0;i<sizes.length;i++){
    var s = sizes[i];
    var bc = document.createElement('div');
    bc.className = 'size-card boys-card';
    bc.id = 'bc'+s;
    bc.innerHTML = '<div class="qty-badge" id="bb'+s+'">0</div>'
      + '<div class="size-label">'+s+'</div>'
      + '<div class="size-tag boys">لڑکا</div>'
      + '<div class="size-rate" id="br'+s+'">Rs.'+boysRate[s]+'</div>'
      + '<input type="number" id="b'+s+'" value="0" min="0">';
    b.appendChild(bc);
    document.getElementById('b'+s).addEventListener('input', (function(sz){ return function(){ onInput(this,'b',sz); }; })(s));

    var gc = document.createElement('div');
    gc.className = 'size-card girls-card';
    gc.id = 'gc'+s;
    gc.innerHTML = '<div class="qty-badge" id="gb'+s+'">0</div>'
      + '<div class="size-label">'+s+'</div>'
      + '<div class="size-tag girls">لڑکی</div>'
      + '<div class="size-rate" id="gr'+s+'">Rs.'+girlsRate[s]+'</div>'
      + '<input type="number" id="g'+s+'" value="0" min="0">';
    g.appendChild(gc);
    document.getElementById('g'+s).addEventListener('input', (function(sz){ return function(){ onInput(this,'g',sz); }; })(s));

buildGrid();

document.addEventListener('focusin', function(e){
  if(e.target.type==='number' && e.target.value==='0') e.target.value='';
});
document.addEventListener('focusout', function(e){
  if(e.target.type==='number' && e.target.value==='') e.target.value='0';
});

function onInput(el, type, s){
  var v = parseInt(el.value)||0;
  var card = document.getElementById((type==='b'?'bc':'gc')+s);
  var badge = document.getElementById((type==='b'?'bb':'gb')+s);
  badge.textContent = v;
  if(v>0) card.classList.add('active'); else card.classList.remove('active');
  liveCalc();
}

function getVal(id){ return parseInt(document.getElementById(id) ? document.getElementById(id).value : 0)||0; }

function onCustomerChange(){
  var cust = document.getElementById('customer').value;
  for(var k in rates[cust].boys) boysRate[k] = rates[cust].boys[k];
  for(var k in rates[cust].girls) girlsRate[k] = rates[cust].girls[k];
  for(var i=0;i<sizes.length;i++){
    var s=sizes[i];
    var br=document.getElementById('br'+s);
    var gr=document.getElementById('gr'+s);
    if(br) br.textContent='Rs.'+boysRate[s];
    if(gr) gr.textContent='Rs.'+girlsRate[s];
  }
  liveCalc();
  var names={'Qari Idrees Sahib':'قاری ادریس صاحب','Qari Sadiq Sahib':'قاری صادق صاحب'};
  showToast('ریٹ تبدیل ہو گئے — '+names[cust]);
}

function updateBalance(){
  var prev = parseInt(document.getElementById('prevBalance').value)||0;
  var recv = parseInt(document.getElementById('received').value)||0;
  var bAmt=0, gAmt=0;
  for(var i=0;i<sizes.length;i++){
    var s=sizes[i];
    bAmt += getVal('b'+s)*boysRate[s];
    gAmt += getVal('g'+s)*girlsRate[s];
  }
  var remaining = bAmt+gAmt+prev-recv;
  document.getElementById('dispPrev').textContent = fmt(prev);
  document.getElementById('dispReceived').textContent = fmt(recv);
  document.getElementById('dispRemaining').textContent = fmt(remaining);
}

function liveCalc(){
  var bQ=0,gQ=0,bAmt=0,gAmt=0;
  for(var i=0;i<sizes.length;i++){
    var s=sizes[i];
    var b=getVal('b'+s), g=getVal('g'+s);
    bQ+=b; gQ+=g;
    bAmt+=b*boysRate[s]; gAmt+=g*girlsRate[s];
  }
  document.getElementById('tBoys').textContent = bQ;
  document.getElementById('tGirls').textContent = gQ;
  document.getElementById('tQty').textContent = bQ+gQ;
  document.getElementById('total').textContent = 'Rs. '+fmt(bAmt+gAmt);
  document.getElementById('boys-count').textContent = bQ+' pcs — Rs. '+fmt(bAmt);
  document.getElementById('girls-count').textContent = gQ+' pcs — Rs. '+fmt(gAmt);
  updateBalance();
  return {bQ:bQ, gQ:gQ, bAmt:bAmt, gAmt:gAmt};
}

function calculate(){ liveCalc(); showToast('حساب مکمل ہو گیا'); }

function resetAll(){
  for(var i=0;i<sizes.length;i++){
    var s=sizes[i];
    var be=document.getElementById('b'+s); if(be) be.value='0';
    var ge=document.getElementById('g'+s); if(ge) ge.value='0';
    var bc=document.getElementById('bc'+s); if(bc) bc.classList.remove('active');
    var gc=document.getElementById('gc'+s); if(gc) gc.classList.remove('active');
  }
  document.getElementById('prevBalance').value='0';
  document.getElementById('received').value='0';
  liveCalc();
  hideInvoice();
  showToast('سب صاف ہو گیا');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}

function hideInvoice(){
  document.getElementById('invoice').style.display='none';
  document.getElementById('hideBtn').style.display='none';
}

function fmt(n){ return n.toLocaleString('en-PK'); }

function generateInvoice(){
  var res = liveCalc();
  var bQ=res.bQ, gQ=res.gQ, bAmt=res.bAmt, gAmt=res.gAmt;
  var prevBal = parseInt(document.getElementById('prevBalance').value)||0;
  var recvAmt = parseInt(document.getElementById('received').value)||0;
  var remaining = bAmt+gAmt+prevBal-recvAmt;
  var custVal = document.getElementById('customer').value;
  var custNames = {'Qari Idrees Sahib':'قاری ادریس صاحب','Qari Sadiq Sahib':'قاری صادق صاحب'};
  var name = custNames[custVal] || custVal;
  var dd=document.getElementById('dd').value;
  var mm=document.getElementById('mm').value;
  var yy=document.getElementById('yy').value;
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var date = dd+' '+months[parseInt(mm)-1]+' '+yy;
  var invNo = document.getElementById('invoiceNo').value || invNum;

  var boysRows='', girlsRows='';
  for(var i=0;i<sizes.length;i++){
    var s=sizes[i];
    var b=getVal('b'+s), g=getVal('g'+s);
    if(b>0) boysRows+='<tr><td>'+s+'</td><td>'+b+'</td><td>'+fmt(boysRate[s])+'</td><td><b>'+fmt(b*boysRate[s])+'</b></td></tr>';
    if(g>0) girlsRows+='<tr><td>'+s+'</td><td>'+g+'</td><td>'+fmt(girlsRate[s])+'</td><td><b>'+fmt(g*girlsRate[s])+'</b></td></tr>';
  }
  if(!boysRows) boysRows='<tr><td colspan="4" style="color:#aaa;">کوئی آئٹم نہیں</td></tr>';
  if(!girlsRows) girlsRows='<tr><td colspan="4" style="color:#aaa;">کوئی آئٹم نہیں</td></tr>';

  var prevHtml = '';
  if(prevBal>0) prevHtml = '<div class="inv-prev"><div class="lbl">پچھلا بقایا</div><div class="val">Rs. '+fmt(prevBal)+'</div></div>';
  var recvHtml = '';
  if(recvAmt>0) recvHtml = '<div class="inv-recv"><div class="lbl">وصول شدہ</div><div class="val">Rs. '+fmt(recvAmt)+'</div></div>';

  var html = '<div class="inv-wrap">'
    +'<div class="inv-head">'
      +'<div class="inv-head-left">'
        +'<h1>اقراء یونیفارم سینٹر</h1>'
        +'<p>📞 0300-7091671</p>'
      +'</div>'
      +'<div class="inv-head-right">'
        +'<div class="inv-no">Bill #'+invNo+'</div>'
        +'<div class="inv-date">'+date+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="inv-meta">'
      +'<div class="inv-meta-block"><div class="lbl">بنام</div><div class="val">'+name+'</div></div>'
      +'<div class="inv-meta-block" style="text-align:center"><div class="lbl">کل تعداد</div><div class="val num">'+(bQ+gQ)+' pcs</div></div>'
      +'<div class="inv-meta-block" style="text-align:left"><div class="lbl">ادائیگی</div><div class="val" style="color:#1a7a4c">زیر التواء</div></div>'
    +'</div>'
    +'<div class="inv-body">'
      +'<div class="inv-tables">'
        +'<div class="inv-table-wrap boys">'
          +'<h3>لڑکا</h3>'
          +'<table class="inv-table"><thead><tr><th>سائز</th><th>تعداد</th><th>ریٹ</th><th>رقم</th></tr></thead>'
          +'<tbody>'+boysRows+'</tbody>'
          +'<tfoot><tr><td>کل</td><td>'+bQ+'</td><td></td><td>Rs. '+fmt(bAmt)+'</td></tr></tfoot>'
          +'</table>'
        +'</div>'
        +'<div class="inv-table-wrap girls">'
          +'<h3>لڑکی</h3>'
          +'<table class="inv-table"><thead><tr><th>سائز</th><th>تعداد</th><th>ریٹ</th><th>رقم</th></tr></thead>'
          +'<tbody>'+girlsRows+'</tbody>'
          +'<tfoot><tr><td>کل</td><td>'+gQ+'</td><td></td><td>Rs. '+fmt(gAmt)+'</td></tr></tfoot>'
          +'</table>'
        +'</div>'
      +'</div>'
      +'<div class="inv-totals">'
        +'<div class="inv-qty-grid">'
          +'<div class="inv-qty-item boys"><div class="lbl">لڑکے</div><div class="val">'+bQ+'</div></div>'
          +'<div class="inv-qty-item girls"><div class="lbl">لڑکیاں</div><div class="val">'+gQ+'</div></div>'
          +'<div class="inv-qty-item total"><div class="lbl">کل</div><div class="val">'+(bQ+gQ)+'</div></div>'
        +'</div>'
        +'<div class="inv-boxes">'
          +'<div class="inv-grand"><div class="lbl">بل کی رقم</div><div class="val">Rs. '+fmt(bAmt+gAmt)+'</div></div>'
          +prevHtml

        +'</div>'

  +'</div>';

  var inv = document.getElementById('invoice');
  inv.innerHTML = html;
  inv.style.display = 'block';

  setTimeout(function(){ doPrint(invNo); }, 350);

function doPrint(invNo){
  var overlay = document.getElementById('pdfOverlay');
  overlay.classList.add('show');

  // Detect if Android WebView
  var isWebView = /wv|WebView/.test(navigator.userAgent) || 
                  (/(iPhone|iPod|iPad).*AppleWebKit(?!.*Safari)/i.test(navigator.userAgent));
  var isAndroid = /Android/.test(navigator.userAgent);

  if(isAndroid || isWebView){
    // Use Android share/download via data URI
    generateImagePDF(invNo, overlay);
  } else {
    // Browser: use print dialog
    overlay.classList.remove('show');
    setTimeout(function(){
      document.title = 'Bill-'+invNo;
      window.print();
    }, 200);
  }
}

function generateImagePDF(invNo, overlay){
  try {
    var inv = document.getElementById('invoice');

    // Build a styled HTML string for the bill
    var billHTML = '<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">'
      + '<style>'
      + 'body{font-family:serif;direction:rtl;margin:10px;background:#fff;color:#000;font-size:13px;}'
      + 'h1{font-size:20px;text-align:center;margin:0 0 4px 0;}'
      + '.phone{text-align:center;font-size:12px;font-weight:bold;margin-bottom:8px;}'
      + '.meta{display:flex;justify-content:space-between;margin:8px 0;padding:6px;background:#f0f0f0;border-radius:4px;}'
      + '.meta span{font-size:12px;}'
      + '.tables{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}'
      + '.tbl-box{border:1px solid #ccc;border-radius:6px;padding:6px;}'
      + '.tbl-box.boys{background:#eef3ff;border-color:#1f4fb3;}'
      + '.tbl-box.girls{background:#fff0f6;border-color:#b3195c;}'
      + '.tbl-title{background:#0b1f3a;color:#fff;text-align:center;padding:5px;border-radius:4px;margin-bottom:6px;font-size:13px;font-weight:bold;}'
      + 'table{width:100%;border-collapse:collapse;font-size:12px;}'
      + 'th{border-bottom:1px solid #999;padding:4px;text-align:center;font-size:11px;color:#555;}'
      + 'td{padding:4px;text-align:center;border-bottom:1px solid #eee;}'
      + 'tfoot td{border-top:2px solid #999;border-bottom:none;font-weight:bold;}'
      + '.summary{display:flex;justify-content:space-between;align-items:center;background:#f5f5f5;padding:8px;border-radius:6px;margin:8px 0;}'
      + '.qty-items{display:flex;gap:14px;}'
      + '.qty-item{text-align:center;}'
      + '.qty-item .ql{font-size:10px;color:#888;}'
      + '.qty-item .qv{font-size:16px;font-weight:bold;}'
      + '.qty-item.boys .qv{color:#1f4fb3;}'
      + '.qty-item.girls .qv{color:#b3195c;}'
      + '.boxes{display:flex;flex-direction:column;gap:5px;min-width:150px;}'
      + '.box{padding:6px 12px;border-radius:5px;text-align:center;}'
      + '.box .bl{font-size:11px;margin-bottom:1px;}'
      + '.box .bv{font-size:16px;font-weight:bold;direction:ltr;display:block;}'
      + '.box.navy{background:#0b1f3a;color:#fff;} .box.navy .bv{color:#e8b95a;}'
      + '.box.gold{background:#b8852e;color:#fff;}'
      + '.box.green{background:#1a7a4c;color:#fff;}'
      + '.box.remain{background:#0b1f3a;border:2px solid #e8b95a;color:#fff;} .box.remain .bv{color:#e8b95a;font-size:18px;}'
      + '.footer{background:#0b1f3a;color:#fff;text-align:center;padding:8px;margin-top:10px;border-radius:5px;font-size:13px;}'
      + '.footer span{color:#e8b95a;}'
      + '</style></head><body>'
      + inv.innerHTML
      + '</body></html>';

    // Open in new window/tab — works in WebView as download
    var blob = new Blob([billHTML], {type:'text/html'});
    var url = URL.createObjectURL(blob);

    // Try to open for printing
    var win = window.open(url, '_blank');
    if(win){
      win.onload = function(){
        win.print();
        URL.revokeObjectURL(url);
      };
    } else {
      // Fallback: download as HTML file (user can open and print)
      var a = document.createElement('a');
      a.href = url;
      a.download = 'Bill-'+invNo+'.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
      showToast('بل ڈاؤنلوڈ ہو گیا — کھول کر پرنٹ کریں');
    }

  } catch(e) {
    console.error(e);
    showToast('خرابی: ' + e.message);
  } finally {
    overlay.classList.remove('show');
  }
}

window.addEventListener('afterprint', function(){
  document.title = 'اقراء یونیفارم سینٹر';
});
